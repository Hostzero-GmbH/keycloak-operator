# Sample KeycloakInstance connecting via admin user/password.
apiVersion: keycloak.hostzero.com/v1beta1
kind: KeycloakInstance
metadata:
  name: keycloak-instance
  namespace: default
spec:
  baseUrl: http://keycloak:8080
  auth:
    passwordGrant:
      secretRef:
        name: keycloak-admin
---
# Sample KeycloakInstance connecting via an OAuth2 service-account client.
apiVersion: keycloak.hostzero.com/v1beta1
kind: KeycloakInstance
metadata:
  name: keycloak-instance-svc
  namespace: default
spec:
  baseUrl: http://keycloak:8080
  auth:
    clientCredentials:
      secretRef:
        name: keycloak-operator-client
